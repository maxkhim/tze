version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-app
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "8088:8088"
#    volumes:
#      - .:/var/www
#      - ./storage:/var/www/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=orders
      - DB_USERNAME=user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    depends_on:
      db:
        condition: service_healthy
    networks:
      - order-network
    command: sh -c "php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=8088"
  queue:
    build:
      context: .
    container_name: order-queue
    restart: unless-stopped
    working_dir: /var/www
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=orders
      - DB_USERNAME=user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    depends_on:
      db:
        condition: service_healthy
    networks:
      - order-network
    command: sh -c "php artisan queue:work redis --sleep=3 --tries=3"

  db:
    image: mariadb:11
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 5s
      timeout: 10s
      retries: 10
    container_name: order-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: orders
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: secret
    ports:
      - "33060:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - order-network

  redis:
    image: redis:alpine
    container_name: order-redis
    restart: unless-stopped
    ports:
      - "63790:6379"
    networks:
      - order-network

networks:
  order-network:
    driver: bridge

volumes:
  dbdata: